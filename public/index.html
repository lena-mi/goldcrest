<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goldcrest — Bubo</title>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #1c1c1c;
  --bg2:    #252525;
  --bg3:    #2e2e2e;
  --border: #383838;
  --text:   #e8e4dc;
  --muted:  #888;
  --accent: #c8f07a;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

/* ── Header ──────────────────────────────────────────────────────────────── */

.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.header-owl {
  width: 46px;
  height: 46px;
  border-radius: 8px;
  flex-shrink: 0;
}

.header-label {
  font-size: 15px;
  font-weight: 500;
}

.header-label em {
  font-style: italic;
  font-weight: 400;
  color: var(--muted);
}

.header-conf { color: var(--accent); }

/* ── Messages ────────────────────────────────────────────────────────────── */

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg-bubo {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 88%;
}

.msg-bubo-text {
  font-size: 15px;
  line-height: 1.65;
  color: var(--text);
}

.msg-user {
  align-self: flex-end;
  background: var(--bg3);
  color: var(--text);
  padding: 11px 16px;
  border-radius: 20px 20px 4px 20px;
  font-size: 15px;
  line-height: 1.5;
  max-width: 80%;
}

/* ── Progress dots ───────────────────────────────────────────────────────── */

.progress-row {
  display: flex;
  align-items: center;
  gap: 5px;
}

.progress-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.2s;
}

.progress-dot.done { background: var(--text); }

.progress-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Quick-reply buttons ─────────────────────────────────────────────────── */

.quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.qr-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 20px;
  padding: 8px 14px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.12s, border-color 0.12s;
}

.qr-btn:hover    { background: var(--bg3); border-color: var(--muted); }
.qr-btn.picked   { background: var(--bg3); border-color: var(--text); }
.qr-btn:disabled { opacity: 0.35; cursor: default; }

.qr-done {
  margin-top: 4px;
  color: var(--muted);
  border-style: dashed;
  width: 100%;
}

.qr-done:not(:disabled) {
  color: var(--text);
  border-style: solid;
}

/* ── ID card ─────────────────────────────────────────────────────────────── */

.id-card {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.id-card-label { font-size: 13px; color: var(--muted); }

.id-card-name {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.3;
}

.id-card-photo {
  width: 200px;
  height: 155px;
  border-radius: 12px;
  object-fit: cover;
  background: var(--bg3);
  display: block;
}

.id-card-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 2px;
}

.btn-log {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 22px;
  border-radius: 20px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  transition: border-color 0.12s;
}

.btn-log:hover    { border-color: var(--muted); }
.btn-log:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-skip {
  background: transparent;
  border: none;
  color: var(--muted);
  padding: 10px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
}

.btn-skip:hover    { color: var(--text); }
.btn-skip:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Unidentified card ───────────────────────────────────────────────────── */

.unid-card { display: flex; flex-direction: column; gap: 6px; }
.unid-label { font-size: 13px; color: var(--muted); }
.unid-body  { font-size: 14px; line-height: 1.7; color: var(--muted); }

/* ── Typing indicator ────────────────────────────────────────────────────── */

.typing { display: flex; gap: 4px; align-items: center; padding: 6px 0; }

.typing-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  animation: tdot 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes tdot {
  0%,60%,100% { transform: translateY(0);    opacity: 0.5; }
  30%          { transform: translateY(-5px); opacity: 1;   }
}

/* ── Input row ───────────────────────────────────────────────────────────── */

.input-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.chat-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 22px;
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  padding: 10px 16px;
  outline: none;
  transition: border-color 0.15s;
}

.chat-input:focus        { border-color: var(--muted); }
.chat-input::placeholder { color: var(--muted); }
.chat-input:disabled     { opacity: 0.4; cursor: not-allowed; }

.send-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: border-color 0.12s;
}

.send-btn:hover    { border-color: var(--muted); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

</style>
</head>
<body>

<div class="app">

  <header class="header">
    <img class="header-owl" src="/Bubo.svg" alt="Bubo">
    <div class="header-label">
      Bubo &nbsp;›› <em>&nbsp;confidence: <span class="header-conf" id="headerConf">—</span></em>
    </div>
  </header>

  <div class="messages" id="messages"></div>

  <div class="input-row">
    <input class="chat-input" id="chatInput" placeholder="Describe what you saw..." autocomplete="off" disabled>
    <button class="send-btn" id="sendBtn" disabled>↑</button>
  </div>

</div>

<script>

// ─── Quick-reply button sets ──────────────────────────────────────────────────

const AXIS_BUTTONS = {
  location: [
    { label: '🌳 woodland / forest',  value: 'woodland or forest'            },
    { label: '🏠 urban / garden',     value: 'urban area or garden'          },
    { label: '🌊 near water',         value: 'near water'                    },
    { label: '🦅 soaring / wires',    value: 'open sky, soaring or on wires' },
    { label: '🌾 open field / heath', value: 'open field or heath'           },
  ],
  size: [
    { label: '🐦 sparrow-sized',    value: 'about sparrow-sized'   },
    { label: '🐦 blackbird-sized',  value: 'about blackbird-sized' },
    { label: '🕊️ pigeon-sized',     value: 'about pigeon-sized'   },
    { label: '🦅 crow-sized',       value: 'about crow-sized'     },
    { label: '🦢 larger than crow', value: 'larger than a crow'   },
  ],
};

const COLOURS = [
  { label: '⬛ black',        value: 'black'         },
  { label: '⬜ white',        value: 'white'         },
  { label: '🟤 brown',        value: 'brown'         },
  { label: '🟠 orange',       value: 'orange'        },
  { label: '🔴 red / rufous', value: 'red or rufous' },
  { label: '🟡 yellow',       value: 'yellow'        },
  { label: '🔵 blue',         value: 'blue'          },
  { label: '🟢 green',        value: 'green'         },
  { label: '🩶 grey',         value: 'grey'          },
];

// ─── Progress dots ────────────────────────────────────────────────────────────

const AXES_ORDER = ['location', 'size', 'colour', 'behaviour', 'sound'];
const axesDone   = new Set();

function makeProgressRow() {
  const row = document.createElement('div');
  row.className = 'progress-row';
  row.id = 'progressRow';
  AXES_ORDER.forEach((ax, i) => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (axesDone.has(ax) ? ' done' : '');
    dot.dataset.axis = ax;
    row.appendChild(dot);
    if (i < AXES_ORDER.length - 1) {
      const line = document.createElement('div');
      line.className = 'progress-line';
      row.appendChild(line);
    }
  });
  return row;
}

function refreshProgressDots() {
  document.querySelectorAll('#progressRow .progress-dot').forEach(dot => {
    dot.classList.toggle('done', axesDone.has(dot.dataset.axis));
  });
}

// ─── State ────────────────────────────────────────────────────────────────────

let history          = [];
let waitingForResp   = false;
let userLocation     = null;
let locationInjected = false;

// ─── DOM refs ─────────────────────────────────────────────────────────────────

const msgsEl    = document.getElementById('messages');
const inputEl   = document.getElementById('chatInput');
const sendBtnEl = document.getElementById('sendBtn');

function scrollToBottom() { msgsEl.scrollTop = msgsEl.scrollHeight; }

function setInputEnabled(on) {
  inputEl.disabled   = !on;
  sendBtnEl.disabled = !on;
  if (on) inputEl.focus();
}

// ─── Bubble helpers ───────────────────────────────────────────────────────────

function addUserBubble(text) {
  const el = document.createElement('div');
  el.className = 'msg-user';
  el.textContent = text;
  msgsEl.appendChild(el);
  scrollToBottom();
}

function addBubble(who, text) {
  if (who === 'user') { addUserBubble(text); return; }
  const wrap = document.createElement('div');
  wrap.className = 'msg-bubo';
  const p = document.createElement('div');
  p.className = 'msg-bubo-text';
  p.innerHTML = text.replace(/\n/g, '<br>');
  wrap.appendChild(p);
  msgsEl.appendChild(wrap);
  scrollToBottom();
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-bubo';
  wrap.id = 'typingRow';
  wrap.innerHTML = `<div class="typing">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>`;
  msgsEl.appendChild(wrap);
  scrollToBottom();
}

function hideTyping() { document.getElementById('typingRow')?.remove(); }

// ─── Confidence header ────────────────────────────────────────────────────────

function updateConf(score) {
  document.getElementById('headerConf').textContent = score + '%';
}

// ─── Tag preprocessing ────────────────────────────────────────────────────────
// Strips [conf:N] and [buttons:X] before display; uses them to update state.

function preprocessResponse(rawText) {
  const confMatch    = rawText.match(/\[conf:(\d+)\]/i);
  const buttonsMatch = rawText.match(/\[buttons:(\w+)\]/i);

  if (confMatch) updateConf(parseInt(confMatch[1]));

  const clean = rawText
    .replace(/\[conf:\d+\]\n?/gi, '')
    .replace(/\[buttons:\w+\]\n?/gi, '')
    .trim();

  return {
    clean,
    axis: buttonsMatch?.[1]?.toLowerCase() ?? null,
    conf: confMatch ? parseInt(confMatch[1]) : null,
  };
}

// ─── Bird photo (Wikipedia) ───────────────────────────────────────────────────

async function fetchBirdPhoto(commonName) {
  try {
    const title = commonName.trim().replace(/ /g, '_');
    const res = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`
    );
    if (!res.ok) return null;
    const data = await res.json();
    return data.thumbnail?.source ?? null;
  } catch {
    return null;
  }
}

// ─── Quick-reply injection ────────────────────────────────────────────────────

function addQuickReplies(axis, parentWrap) {
  const buttons = AXIS_BUTTONS[axis];
  if (!buttons) return;

  axesDone.add(axis);
  refreshProgressDots();

  const row = document.createElement('div');
  row.className = 'quick-replies';

  buttons.forEach(({ label, value }) => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = label;
    btn.addEventListener('click', () => {
      row.querySelectorAll('.qr-btn').forEach(b => {
        b.disabled = true;
        if (b === btn) b.classList.add('picked');
      });
      addUserBubble(label);
      sendMessage(value);
    });
    row.appendChild(btn);
  });

  parentWrap.appendChild(row);
  scrollToBottom();
}

// ─── Colour multi-select (up to 3) ───────────────────────────────────────────

function addColourButtons(parentWrap) {
  axesDone.add('colour');
  refreshProgressDots();

  const selected = [];

  const grid = document.createElement('div');
  grid.className = 'quick-replies';

  const doneBtn = document.createElement('button');
  doneBtn.className = 'qr-btn qr-done';
  doneBtn.textContent = 'Done →';
  doneBtn.disabled = true;

  COLOURS.forEach(({ label, value }) => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = label;
    btn.addEventListener('click', () => {
      const idx = selected.indexOf(value);
      if (idx >= 0) {
        selected.splice(idx, 1);
        btn.classList.remove('picked');
      } else if (selected.length < 3) {
        selected.push(value);
        btn.classList.add('picked');
      }
      doneBtn.disabled = selected.length === 0;
    });
    grid.appendChild(btn);
  });

  doneBtn.addEventListener('click', () => {
    if (selected.length === 0) return;
    grid.querySelectorAll('.qr-btn').forEach(b => b.disabled = true);
    doneBtn.disabled = true;
    const answer = selected.length === 1
      ? selected[0]
      : selected.slice(0, -1).join(', ') + ' and ' + selected.at(-1);
    addUserBubble(answer);
    sendMessage(answer);
  });

  grid.appendChild(doneBtn);
  parentWrap.appendChild(grid);
  scrollToBottom();
}

// ─── Response parser ──────────────────────────────────────────────────────────

async function parseAndRender(rawText) {
  const { clean: text, axis, conf } = preprocessResponse(rawText);

  // ── ID card ──
  if (text.includes('**Possible ID:**')) {
    const idMatch    = text.match(/\*\*Possible ID:\*\*\s+(.+?)\s+\(\*(.+?)\*\)/);
    const commonName = idMatch?.[1]?.trim() ?? 'Unknown species';
    const sciName    = idMatch?.[2]?.trim() ?? '';

    const wrap = document.createElement('div');
    wrap.className = 'msg-bubo';

    const card = document.createElement('div');
    card.className = 'id-card';

    const photo = document.createElement('img');
    photo.className = 'id-card-photo';
    photo.alt = commonName;

    card.innerHTML = `
      <div class="id-card-label">Is this your bird?</div>
      <div class="id-card-name">${commonName}</div>
    `;
    card.appendChild(photo);

    const actions = document.createElement('div');
    actions.className = 'id-card-actions';
    actions.innerHTML = `
      <button class="btn-log">Yes! Log it</button>
      <button class="btn-skip">Not sure</button>
    `;
    actions.querySelector('.btn-log').addEventListener('click',
      () => handleLog(commonName, sciName, conf, actions));
    actions.querySelector('.btn-skip').addEventListener('click', handleSkip);
    card.appendChild(actions);

    wrap.appendChild(card);
    msgsEl.appendChild(wrap);
    scrollToBottom();

    fetchBirdPhoto(commonName).then(url => {
      if (url) photo.src = url;
      else     photo.style.display = 'none';
    });

    return;
  }

  // ── Unidentified ──
  if (text.includes('**Status:** Unidentified')) {
    const evidMatch = text.match(/\*\*Evidence collected:\*\*([\s\S]+?)(?=\*\*Suggested|$)/);
    const nextMatch = text.match(/\*\*Suggested next step:\*\*\s+([\s\S]+?)$/);

    const wrap = document.createElement('div');
    wrap.className = 'msg-bubo';
    const card = document.createElement('div');
    card.className = 'unid-card';
    card.innerHTML = `
      <div class="unid-label">Unidentified</div>
      <div class="unid-body">
        ${evidMatch?.[1]?.trim().replace(/\n/g, '<br>') ?? ''}
        ${nextMatch?.[1] ? `<br><br>${nextMatch[1].trim()}` : ''}
      </div>
    `;
    wrap.appendChild(card);
    msgsEl.appendChild(wrap);
    scrollToBottom();
    return;
  }

  // ── Plain message ──
  const wrap = document.createElement('div');
  wrap.className = 'msg-bubo';

  const p = document.createElement('div');
  p.className = 'msg-bubo-text';
  p.innerHTML = text.replace(/\n/g, '<br>');
  wrap.appendChild(p);

  // Show progress dots on first question that has an axis
  if (axis && !document.getElementById('progressRow')) {
    wrap.appendChild(makeProgressRow());
  }

  // Inject buttons based on the tag Bubo sent
  if (axis === 'colour') {
    addColourButtons(wrap);
  } else if (axis) {
    addQuickReplies(axis, wrap);
  }

  msgsEl.appendChild(wrap);
  scrollToBottom();
}

// ─── Log / Skip handlers ──────────────────────────────────────────────────────

async function handleLog(commonName, sciName, conf, actionsEl) {
  actionsEl.querySelectorAll('button').forEach(b => b.disabled = true);

  try {
    const res = await fetch('/log', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ common_name: commonName, scientific_name: sciName, confidence: conf })
    });

    if (res.ok) {
      addBubble('bubo', `${commonName} — Logged.`);
    } else {
      const data = await res.json();
      addBubble('bubo', `Log failed: ${data.error ?? 'unknown error'}`);
    }
  } catch {
    addBubble('bubo', 'Log failed: connection error.');
  }
}

function handleSkip() {
  addUserBubble('Not sure');
  sendMessage('I am not sure about that identification. Can you ask me another question to narrow it down?');
}

// ─── Send message ─────────────────────────────────────────────────────────────

async function sendMessage(overrideText) {
  const text = overrideText ?? inputEl.value.trim();
  if (!text || waitingForResp) return;

  if (!overrideText) {
    inputEl.value = '';
    addUserBubble(text);
  }

  // Inject location silently into first API message only
  let apiText = text;
  if (!locationInjected && userLocation && history.length === 0) {
    apiText = `${text}\n\n[My location: ${userLocation}]`;
    locationInjected = true;
  }

  waitingForResp = true;
  setInputEnabled(false);
  showTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: apiText, history })
    });

    const data = await res.json();
    hideTyping();

    if (!res.ok) {
      addBubble('bubo', `Error: ${data.error ?? 'Something went wrong.'}`);
    } else {
      history = data.history;
      await parseAndRender(data.response);
    }

  } catch (err) {
    hideTyping();
    addBubble('bubo', 'Connection error. Check that the server is running.');
    console.error(err);
  }

  waitingForResp = false;
  setInputEnabled(true);
}

// ─── Events ───────────────────────────────────────────────────────────────────

sendBtnEl.addEventListener('click', () => sendMessage());

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ─── Geolocation ─────────────────────────────────────────────────────────────
// Reverse geocode via Nominatim (free, no key needed).
// Result is injected silently into the first message only.

function getLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    async pos => {
      try {
        const { latitude, longitude } = pos.coords;
        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`,
          { headers: { 'User-Agent': 'Goldcrest/1.0 bird-sighting-app' } }
        );
        const data = await res.json();
        const city    = data.address.city || data.address.town || data.address.village || data.address.county;
        const country = data.address.country;
        if (city || country) userLocation = [city, country].filter(Boolean).join(', ');
      } catch { /* silently skip */ }
    },
    () => { /* permission denied — silently skip */ },
    { timeout: 8000 }
  );
}

getLocation();

// ─── Status check on load ─────────────────────────────────────────────────────

function checkStatus() {
  fetch('/status')
    .then(r => r.json())
    .then(data => {
      if (data.connected) {
        setInputEnabled(true);
        addBubble('bubo', 'READY.\n\nDescribe what you saw.\nHabitat, size, any markings.\nEven rough details help.');
      } else {
        setTimeout(checkStatus, 2000);
      }
    })
    .catch(() => {
      addBubble('bubo', 'Server offline — run node server.js');
      setTimeout(checkStatus, 3000);
    });
}

checkStatus();

</script>
</body>
</html>
